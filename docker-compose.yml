services:
  postgres:
    image: postgres:16-alpine
    container_name: careplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: careplus
      POSTGRES_USER: careplus
      POSTGRES_PASSWORD: careplus
      TZ: Africa/Casablanca
      PGTZ: Africa/Casablanca
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplus -d careplus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: careplus-postgres-data
