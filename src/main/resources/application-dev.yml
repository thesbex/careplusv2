spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/careplus
    username: careplus
    password: careplus
  flyway:
    locations: classpath:db/migration,classpath:db/seed
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

careplus:
  security:
    cors:
      # Vite dev server runs on :5173 separately from Spring Boot on :8080.
      allowed-origins: http://localhost:5173,http://127.0.0.1:5173

logging:
  level:
    ma.careplus: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
