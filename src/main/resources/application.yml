spring:
  application:
    name: careplus
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Africa/Casablanca
        generate_statistics: false
        format_sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    placeholder-replacement: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never
  forward-headers-strategy: framework

careplus:
  deployment-mode: ${CAREPLUS_DEPLOYMENT_MODE:ON_PREMISE}
  enabled: ${CAREPLUS_ENABLED:true}
  time:
    zone: Africa/Casablanca
  security:
    jwt:
      secret: ${CAREPLUS_JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
      issuer: careplus
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
    login:
      rate-limit-attempts: 5
      rate-limit-window-minutes: 15
  modules:
    pregnancy:
      enabled: false
    amo:
      enabled: false
    backup:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    ma.careplus: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
